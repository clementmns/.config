# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set -g mouse on
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on

# ── Windows & Panes ───────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind - split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
unbind |

# ── AZERTY window selection (macOS) ──────────────────────────────────────────
unbind &
unbind "'"
unbind (
bind '&'  select-window -t 1
bind 'é'  select-window -t 2
bind '"'  select-window -t 3
bind "'"  select-window -t 4
bind '('  select-window -t 5
bind '§'  select-window -t 6
bind 'è'  select-window -t 7
bind '!'  select-window -t 8
bind 'ç'  select-window -t 9
bind 'à'  select-window -t 10

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Config reload ──────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=default,fg=default"
set -g status-justify absolute-centre
set -g status-left-length 40
set -g status-right-length 40

# Left: session name — green bold (comme %n@%m dans le prompt)
set -g status-left "#[fg=green,bold] #S #[default]"

# Right: prefix indicator + hostname — green bold
set -g status-right "#{?client_prefix,#[fg=yellow bold] [C-a] #[fg=green bold],#[fg=green bold]} #h "

# Tabs: inactif = white, actif = yellow bold (comme %1~ dans le prompt)
set -g window-status-format         "#[fg=white] #I:#W "
set -g window-status-current-format "#[fg=yellow,bold] #I:#W #[default]"
set -g window-status-separator      "#[fg=white]│"

# Pane borders — discrets
set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=blue"

run '~/.config/tmux/plugins/tpm/tpm'